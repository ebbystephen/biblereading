<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#1e3a5f" />
    <title>Bible Reading</title>
    <link href="Site.css?v=4.0" rel="stylesheet" />
    <link href="favicon.ico" rel="shortcut icon" type="image/x-icon" />
</head>
<body>
    <nav class="navbar" role="navigation" aria-label="Main navigation">
        <div class="nav-inner">
            <a href="./" class="nav-brand">
                <span class="brand-cross">✝</span>
                My Bible Reading
            </a>
        </div>
    </nav>

    <div id="toast-area" aria-live="polite" aria-atomic="true"></div>

    <main class="main-wrap">

        <!-- Dashboard -->
        <section class="dashboard" aria-label="Reading progress summary">
            <div class="dash-grid">
                <div class="dash-card">
                    <div class="ring-wrap">
                        <svg class="dash-ring" viewBox="0 0 64 64" aria-hidden="true">
                            <circle class="ring-track" cx="32" cy="32" r="26" />
                            <circle class="ring-fill" id="ring-total" cx="32" cy="32" r="26" />
                        </svg>
                        <span class="ring-pct" id="pct-total">0%</span>
                    </div>
                    <div class="dash-label">Total</div>
                    <div class="dash-count" id="count-total">0 / 0</div>
                </div>
                <div class="dash-card">
                    <div class="ring-wrap">
                        <svg class="dash-ring" viewBox="0 0 64 64" aria-hidden="true">
                            <circle class="ring-track" cx="32" cy="32" r="26" />
                            <circle class="ring-fill" id="ring-ot" cx="32" cy="32" r="26" />
                        </svg>
                        <span class="ring-pct" id="pct-ot">0%</span>
                    </div>
                    <div class="dash-label">Old Testament</div>
                    <div class="dash-count" id="count-ot">0 / 0</div>
                </div>
                <div class="dash-card">
                    <div class="ring-wrap">
                        <svg class="dash-ring" viewBox="0 0 64 64" aria-hidden="true">
                            <circle class="ring-track" cx="32" cy="32" r="26" />
                            <circle class="ring-fill" id="ring-nt" cx="32" cy="32" r="26" />
                        </svg>
                        <span class="ring-pct" id="pct-nt">0%</span>
                    </div>
                    <div class="dash-label">New Testament</div>
                    <div class="dash-count" id="count-nt">0 / 0</div>
                </div>
                <div class="dash-card dash-card-books">
                    <div class="books-icon" aria-hidden="true">&#128214;</div>
                    <div class="dash-label">Books Done</div>
                    <div class="dash-count" id="count-books">0 / 73</div>
                    <div class="mini-bar-wrap" aria-hidden="true">
                        <div class="mini-bar"><div class="mini-fill" id="bar-books"></div></div>
                    </div>
                </div>
            </div>

            <!-- 100-Day Plan strip -->
            <div class="plan-strip">
                <div class="plan-strip-info">
                    <span class="plan-strip-icon" aria-hidden="true">&#128197;</span>
                    <span class="plan-strip-label">100 Days Plan</span>
                    <span class="plan-strip-count" id="plan-days-count">0 / 99 days</span>
                </div>
                <div class="plan-strip-track">
                    <div class="plan-strip-fill" id="bar-plan"></div>
                </div>
            </div>
        </section>

        <!-- Tab Bar -->
        <div class="tab-bar" role="tablist" aria-label="Bible sections">
            <button class="tab-btn active" role="tab" aria-selected="true"
                    aria-controls="pane-ot" id="tab-ot" data-pane="pane-ot">
                Old Testament
            </button>
            <button class="tab-btn" role="tab" aria-selected="false"
                    aria-controls="pane-nt" id="tab-nt" data-pane="pane-nt">
                New Testament
            </button>
            <button class="tab-btn" role="tab" aria-selected="false"
                    aria-controls="pane-plan" id="tab-plan" data-pane="pane-plan">
                100 Days
            </button>
        </div>

        <!-- Tab Panes -->
        <div class="tab-pane active" role="tabpanel" id="pane-ot" aria-labelledby="tab-ot">
            <div class="accordion-wrap" id="old-accordion"></div>
        </div>
        <div class="tab-pane" role="tabpanel" id="pane-nt" aria-labelledby="tab-nt" hidden>
            <div class="accordion-wrap" id="new-accordion"></div>
        </div>
        <div class="tab-pane" role="tabpanel" id="pane-plan" aria-labelledby="tab-plan" hidden>
            <div id="plan-list" class="plan-list"></div>
        </div>

    </main>

    <footer class="site-footer">
        <p>&copy; <span id="year"></span> Bible Reading</p>
    </footer>

    <script src="Site.js?v=4.0"></script>
</body>
</html>
